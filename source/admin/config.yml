# 当前使用指向阿里云 IP 的临时 sslip.io 域名，以满足 CMS 的 HTTPS 要求。
backend:
  name: github
  repo: dingyi00110/blog
  branch: main
  base_url: https://39-102-210-194.sslip.io
  auth_endpoint: oauth/auth

publish_mode: simple
media_folder: source/images/uploads
public_folder: /images/uploads
site_url: https://39-102-210-194.sslip.io
display_url: https://39-102-210-194.sslip.io
logo_url: /images/favicon.svg
locale: zh_Hans

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: source/_posts
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    sortable_fields: [date, title, author, lang]
    summary: '{{title}} · {{author}} · {{lang}}'
    view_filters:
      - label: 中文
        field: lang
        pattern: zh
      - label: English
        field: lang
        pattern: en
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: HH:mm }
      - { label: 更新时间, name: updated, widget: datetime, required: false }
      - label: 作者
        name: author
        widget: select
        options:
          - { label: NeverDown, value: admin }
        hint: 新作者需要由管理员在主题配置及此列表中添加一次。
      - label: 语言
        name: lang
        widget: select
        options:
          - { label: 中文, value: zh }
          - { label: English, value: en }
      - { label: 翻译关联标识, name: translation_key, widget: string, required: false, hint: 中英文对应文章填写完全相同的英文标识。 }
      - { label: 摘要, name: description, widget: text }
      - { label: 分类, name: categories, widget: list, allow_add: true, default: [] }
      - { label: 标签, name: tags, widget: list, allow_add: true, default: [] }
      - { label: 封面图, name: cover, widget: image, required: false }
      - { label: 开启评论, name: comments, widget: boolean, default: true }
      - { label: 正文, name: body, widget: markdown }
