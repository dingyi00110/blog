limit_req_zone $binary_remote_addr zone=cms_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=cms_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name 39.102.210.194;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://39.102.210.194$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 39.102.210.194;

    ssl_certificate /etc/letsencrypt/live/39.102.210.194/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/39.102.210.194/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:NeverDownTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /var/www/neverdown/current;
    index index.html;
    client_max_body_size 6m;

    location ^~ /admin/ {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ $uri.html =404;
    }

    location = /cms-api/auth/login {
        limit_req zone=cms_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3001/auth/login;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /cms-api/ {
        limit_req zone=cms_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

