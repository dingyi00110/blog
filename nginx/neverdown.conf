server {
    listen 80;
    listen [::]:80;
    server_name 39.102.210.194;

    root /var/www/neverdown/current;
    index index.html;

    location ^~ /admin/ {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ $uri.html =404;
    }

    # Current no-domain deployment: only SSH port-forwarded requests reach
    # Nginx from 127.0.0.1. Public HTTP clients cannot call the password API.
    location /cms-api/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
}
